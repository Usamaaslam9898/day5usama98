name: Code Checks

on:
  push:
  pull_request:

jobs:
  greeting:
    runs-on: ubuntu-latest

    steps:
      - name: Greeting
        run: echo "Hello world"

  run-python-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[test]"

      - name: Test package
        run: python -m pytest

  run-python-314-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install package
        run: python -m pip install -e ".[test]"

      - name: Test package
        run: python -m pytest
